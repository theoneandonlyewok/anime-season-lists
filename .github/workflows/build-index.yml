name: Build index

on:
  push:
    paths:
      - "lists/**"         # runs when you commit a new/updated list
  workflow_dispatch: {}    # or trigger it by hand

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build index
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="${{ github.event.repository.name }}"
          python build_index.py lists --out-dir . --base-url "https://${OWNER}.github.io/${REPO}/"

      - name: Commit index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html manifest.json
          git diff --staged --quiet || git commit -m "Rebuild index ($(date -u +%Y-%m-%d))"
          git push
